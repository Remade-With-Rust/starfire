# cargo-deny config — the license gate from docs/08-open-source-and-license.md.
# The whole point: fail the build on ANY copyleft (GPL/LGPL) dependency.

[licenses]
# Only permissive licenses are allowed anywhere in the tree.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
]
confidence-threshold = 0.9
# No copyleft exceptions. If a dep needs one, it doesn't belong in Starfire.

[bans]
multiple-versions = "warn"
wildcards = "warn"
# Intra-workspace path deps have no version req; that's expected, not a smell.
allow-wildcard-paths = true

[advisories]
version = 2
yanked = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
